name: Upstream Sync (OpenClaw)

# Runs weekly on Mondays at 6 AM EST, or manually
on:
  schedule:
    - cron: '0 11 * * 1'  # Monday 11:00 UTC = 6:00 AM EST
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync (tag, branch, or commit)'
        required: false
        default: 'main'
      dry_run:
        description: 'Dry run (no merge, just report)'
        required: false
        type: boolean
        default: false

env:
  UPSTREAM_REPO: 'https://github.com/openclaw/openclaw.git'
  TARGET_BRANCH: 'nicholsbot/main'

jobs:
  sync:
    name: 'Sync from OpenClaw upstream'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout NicholsBot
      uses: actions/checkout@v4
      with:
        ref: ${{ env.TARGET_BRANCH }}
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Add upstream remote
      run: |
        git remote add upstream ${{ env.UPSTREAM_REPO }} 2>/dev/null || true
        git fetch upstream main --tags

    - name: Calculate sync stats
      id: stats
      run: |
        UPSTREAM_REF="${{ github.event.inputs.upstream_ref || 'main' }}"
        
        # Count commits behind
        BEHIND=$(git rev-list --count HEAD..upstream/${UPSTREAM_REF})
        echo "behind=${BEHIND}" >> $GITHUB_OUTPUT
        
        # Get upstream version
        UPSTREAM_VERSION=$(git show upstream/${UPSTREAM_REF}:package.json | jq -r '.version // "unknown"' 2>/dev/null || echo "unknown")
        echo "upstream_version=${UPSTREAM_VERSION}" >> $GITHUB_OUTPUT
        
        # Get our version
        OUR_VERSION=$(jq -r '.version // "unknown"' package.json)
        echo "our_version=${OUR_VERSION}" >> $GITHUB_OUTPUT
        
        # Get latest upstream tag
        LATEST_TAG=$(git describe --tags --abbrev=0 upstream/${UPSTREAM_REF} 2>/dev/null || echo "none")
        echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        
        echo "📊 Sync Stats:"
        echo "  Our version:      ${OUR_VERSION}"
        echo "  Upstream version:  ${UPSTREAM_VERSION}"
        echo "  Commits behind:    ${BEHIND}"
        echo "  Latest tag:        ${LATEST_TAG}"

    - name: Check for conflicts (dry run)
      id: conflict_check
      run: |
        UPSTREAM_REF="${{ github.event.inputs.upstream_ref || 'main' }}"
        
        # Try merge in a temporary branch
        git checkout -b sync-test-${{ github.run_id }}
        
        if git merge --no-commit --no-ff upstream/${UPSTREAM_REF} 2>&1; then
          echo "conflicts=false" >> $GITHUB_OUTPUT
          echo "✅ No conflicts detected"
          git merge --abort 2>/dev/null || true
        else
          echo "conflicts=true" >> $GITHUB_OUTPUT
          echo "⚠️ Conflicts detected in:"
          git diff --name-only --diff-filter=U
          git merge --abort
        fi
        
        git checkout ${{ env.TARGET_BRANCH }}
        git branch -D sync-test-${{ github.run_id }} 2>/dev/null || true

    - name: Create sync branch and merge
      if: ${{ github.event.inputs.dry_run != 'true' && steps.stats.outputs.behind != '0' }}
      run: |
        UPSTREAM_REF="${{ github.event.inputs.upstream_ref || 'main' }}"
        SYNC_BRANCH="sync/upstream-$(date +%Y%m%d)"
        
        git checkout -b ${SYNC_BRANCH}
        
        # Attempt merge
        if git merge upstream/${UPSTREAM_REF} \
          -m "chore: sync upstream OpenClaw (${{ steps.stats.outputs.our_version }} → ${{ steps.stats.outputs.upstream_version }})" \
          --no-edit; then
          
          git push origin ${SYNC_BRANCH}
          echo "SYNC_BRANCH=${SYNC_BRANCH}" >> $GITHUB_ENV
          echo "MERGE_STATUS=clean" >> $GITHUB_ENV
        else
          echo "MERGE_STATUS=conflicts" >> $GITHUB_ENV
          echo "⚠️ Merge has conflicts. Manual resolution needed."
          
          # Still push the branch with conflicts for manual resolution
          git add -A
          git commit -m "chore: sync upstream (CONFLICTS NEED RESOLUTION)" --allow-empty
          git push origin ${SYNC_BRANCH}
          echo "SYNC_BRANCH=${SYNC_BRANCH}" >> $GITHUB_ENV
        fi

    - name: Create Pull Request
      if: ${{ github.event.inputs.dry_run != 'true' && steps.stats.outputs.behind != '0' }}
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ env.SYNC_BRANCH }}
        base: ${{ env.TARGET_BRANCH }}
        title: "⬆️ Upstream sync: OpenClaw ${{ steps.stats.outputs.our_version }} → ${{ steps.stats.outputs.upstream_version }}"
        body: |
          ## Upstream Sync Report
          
          | Metric | Value |
          |--------|-------|
          | Our version | `${{ steps.stats.outputs.our_version }}` |
          | Upstream version | `${{ steps.stats.outputs.upstream_version }}` |
          | Commits behind | **${{ steps.stats.outputs.behind }}** |
          | Latest tag | `${{ steps.stats.outputs.latest_tag }}` |
          | Conflicts | ${{ steps.conflict_check.outputs.conflicts == 'true' && '⚠️ YES — manual resolution needed' || '✅ None' }} |
          | Merge status | `${{ env.MERGE_STATUS }}` |
          
          ### NicholsBot-specific files to verify after merge:
          - [ ] `src/superclaw/` — bridge, skynet, identity
          - [ ] Banner / CLI output — still shows 🦊 NicholsBot
          - [ ] Config paths — `~/.nicholsbot/` not reverted to `~/.openclaw/`
          - [ ] Port — still 18790
          - [ ] Process name — still `nicholsbot`
          
          ### Post-merge checklist:
          - [ ] `pnpm install` succeeds
          - [ ] `pnpm exec tsc --noEmit` passes
          - [ ] `pnpm test` passes
          - [ ] NicholsBot daemon starts on port 18790
          - [ ] Identity check: no 🦞 in user-facing output
          
          ---
          *Auto-generated by upstream-sync workflow*
        labels: upstream-sync,automated
        draft: ${{ steps.conflict_check.outputs.conflicts == 'true' }}

    - name: Summary
      run: |
        echo "## 🦊 Upstream Sync Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Commits behind | ${{ steps.stats.outputs.behind }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Our version | ${{ steps.stats.outputs.our_version }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Upstream version | ${{ steps.stats.outputs.upstream_version }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Conflicts | ${{ steps.conflict_check.outputs.conflicts }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
